<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>注音樂園</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<button class="home-btn" id="homeBtn" onclick="goHome()">🏠</button>

<div class="feedback-banner" id="feedbackBanner"></div>

<!-- 首頁 -->
<div class="screen active" id="screen-home">
  <h1>🎈 注音樂園 🎈</h1>
  <div class="menu-grid">
    <button class="menu-card card-1" onclick="showScreen('flashcards')">
      <span class="icon">🀄</span>
      <span>認識注音符號</span>
    </button>
    <button class="menu-card card-2" onclick="showScreen('match')">
      <span class="icon">🎧</span>
      <span>聽音找符號</span>
    </button>
    <button class="menu-card card-3" onclick="showScreen('pinyin')">
      <span class="icon">🧩</span>
      <span>拼音練習</span>
    </button>
    <button class="menu-card card-4" onclick="showScreen('quiz')">
      <span class="icon">🏆</span>
      <span>小測驗</span>
    </button>
    <button class="menu-card card-5" onclick="showScreen('mole')">
      <span class="icon">🔨</span>
      <span>打地鼠</span>
    </button>
    <button class="menu-card card-6" onclick="showScreen('wordhead')">
      <span class="icon">🔤</span>
      <span>看圖找字頭</span>
    </button>
    <button class="menu-card card-7" onclick="showScreen('memory')">
      <span class="icon">🃏</span>
      <span>記憶配對</span>
    </button>
  </div>
</div>

<!-- 認識注音符號牌 -->
<div class="screen" id="screen-flashcards">
  <h2>認識注音符號</h2>
  <div class="flashcard" id="flashcard" onclick="speakCurrentFlashcard()">
    <div class="symbol-big" id="fcSymbol">ㄅ</div>
    <div class="word-emoji" id="fcEmoji">👨</div>
    <div class="word-text" id="fcWord">爸爸</div>
  </div>
  <div class="card-nav">
    <button class="nav-arrow" onclick="prevFlashcard()">⬅️</button>
    <span class="progress-text" id="fcProgress">1 / 37</span>
    <button class="nav-arrow" onclick="nextFlashcard()">➡️</button>
  </div>
</div>

<!-- 聽音找符號 遊戲 -->
<div class="screen" id="screen-match">
  <h2>聽音找符號</h2>
  <div class="prompt-box">
    <button class="speaker-btn" id="matchSpeaker" onclick="replayMatchSound()">🔊</button>
  </div>
  <div class="choices-grid" id="matchChoices"></div>
</div>

<!-- 拼音練習 -->
<div class="screen" id="screen-pinyin">
  <h2>拼音練習</h2>
  <div class="pinyin-row">
    <div class="pinyin-slot" id="pinyinInitial" onclick="speakPart('initial')">ㄅ</div>
    <span class="plus-sign">➕</span>
    <div class="pinyin-slot" id="pinyinFinal" onclick="speakPart('final')">ㄚˋ</div>
  </div>
  <button class="big-btn combine-btn" onclick="combinePinyin()">拼起來！</button>
  <div class="result-box" id="pinyinResult"></div>
  <div class="card-nav">
    <button class="nav-arrow" onclick="prevPinyin()">⬅️</button>
    <span class="progress-text" id="pinyinProgress">1 / 22</span>
    <button class="nav-arrow" onclick="nextPinyin()">➡️</button>
  </div>
</div>

<!-- 小測驗 -->
<div class="screen" id="screen-quiz">
  <h2>小測驗</h2>
  <div class="quiz-header">
    <span id="quizProgress">第 1 / 8 題</span>
    <span class="stars" id="quizStars">⭐️ 0</span>
  </div>
  <div id="quizQuestionArea"></div>
</div>

<!-- 打地鼠 -->
<div class="screen" id="screen-mole">
  <h2>打地鼠 🔨</h2>
  <div class="mole-header">
    <div class="mole-target-box">
      <button class="mole-mini-speaker" onclick="replayMoleSound()">🔊</button>
      <span style="font-size:1rem;color:#5b4636;font-weight:bold">聽音打牠！</span>
    </div>
    <div class="mole-stats">
      <span>⭐ <span id="moleScore">0</span></span>
      <span>⏱ <span id="moleTimer">60</span>s</span>
    </div>
  </div>
  <div class="mole-grid" id="moleGrid"></div>
  <div class="mole-gameover" id="moleGameover" style="display:none">
    <div class="gameover-box">
      <div style="font-size:3.5rem">🎉</div>
      <div style="font-size:1.4rem;font-weight:bold;color:#5b4636">時間到！</div>
      <div class="big-score">⭐ <span id="moleFinalScore">0</span></div>
      <button class="big-btn combine-btn" onclick="startMoleGame()">再玩一次！</button>
    </div>
  </div>
</div>

<!-- 看圖找字頭 -->
<div class="screen" id="screen-wordhead">
  <h2>看圖找字頭</h2>
  <div class="prompt-box">
    <div class="flashcard" style="cursor:pointer;height:220px;width:min(300px,70vw)" onclick="replayWordHeadSound()">
      <div class="word-emoji" id="whEmoji" style="font-size:70px"></div>
      <div class="word-text" id="whWord"></div>
    </div>
  </div>
  <div class="choices-grid" id="whChoices"></div>
</div>

<!-- 記憶配對 -->
<div class="screen" id="screen-memory">
  <h2>記憶配對</h2>
  <div class="memory-header">
    <span id="memoryMoves">翻牌次數：0</span>
    <span id="memoryMatched">配對：0 / 6</span>
  </div>
  <div class="memory-grid" id="memoryGrid"></div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
